<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Артефакт — музей размером с город</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000;
      --white: #fff;
      --border: rgba(0,0,0,0.1);
      --edge: 48px;
      --nav-h: 64px;
    }

    html { font-size: 16px; overflow-y: scroll; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NAV ────────────────────────────────────────────────────────────────── */
    .site-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--edge);
      background: var(--white);
      transition: background 0.35s ease, color 0.35s ease, transform 0.3s ease;
    }
    .site-nav.nav--hidden { transform: translateY(-100%); }

    .site-nav.nav--transparent {
      background: transparent;
    }
    .site-nav.nav--transparent .nav-logo-main,
    .site-nav.nav--transparent .nav-logo-sub,
    .site-nav.nav--transparent .nav-btn {
      color: var(--white);
    }

    .nav-logo { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 14px; }
    .nav-logo-main {
      display: flex;
      align-items: center;
      color: var(--black);
      transition: color 0.35s ease;
      flex-shrink: 0;
    }
    .nav-logo-sub {
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.01em;
      line-height: 1.35;
      opacity: 0.45;
      white-space: pre-line;
      transition: color 0.35s ease;
    }

    .nav-links { display: flex; gap: 32px; list-style: none; }

    .nav-btn {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--black);
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.15s, color 0.35s ease;
      padding: 0;
    }
    .nav-btn:hover  { opacity: 0.35; }
    .nav-btn.active { opacity: 1; }

    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-direction: column;
      gap: 5px;
    }
    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--black);
      transition: background 0.35s ease, transform 0.25s ease, opacity 0.25s ease;
    }
    .site-nav.nav--transparent .nav-hamburger span { background: var(--white); }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .nav-mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0;
      background: var(--white);
      z-index: 999;
      padding: 16px var(--edge) 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .nav-mobile-menu.open { display: block; }
    .nav-mobile-menu ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .nav-mobile-menu .nav-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 0;
      font-size: 1.1rem;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .nav-mobile-menu li:last-child .nav-btn { border-bottom: none; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
    }

    /* ─── VIEWS ──────────────────────────────────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; }
    #view-map.active   { display: flex; }

    /* ─── GALLERY ────────────────────────────────────────────────────────────── */
    .gallery-section { padding: 48px var(--edge) 80px; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 14px;
      row-gap: 44px;
    }

    .card { cursor: pointer; }

    .card-photo {
      position: relative;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #e8e8e8;
      border-radius: 16px;
    }
    .card-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.55s ease;
    }
    .card:hover .card-photo img { transform: scale(1.04); }

    .card-hover {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.76) 0%, rgba(0,0,0,0) 55%);
      opacity: 0;
      transition: opacity 0.22s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px 18px;
      color: #fff;
    }
    .card:hover .card-hover { opacity: 1; }
    .card-hover-bottom {
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .card-hover-left { flex: 1; min-width: 0; }

    .card-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    .card-status::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-live::before { background: #6de46d; }
    .status-gone::before { background: #e46d6d; }

    .card-hover-author { font-size: 1.05rem; font-weight: 500; margin-bottom: 6px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-hover-meta   { display: flex; align-items: center; gap: 10px; }
    .card-hover-count  { font-size: 0.8rem; font-weight: 300; opacity: 0.65; }
    .card-hover-arrow  {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; margin-left: 14px;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      transform: scale(0.5) translateY(10px); opacity: 0;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
    }
    .card:hover .card-hover-arrow { transform: scale(1) translateY(0); opacity: 1; transition-delay: 0.07s; }

    .card-info  { padding: 13px 0 0; }
    .card-title { font-weight: 600; font-size: 1rem; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 4px; }
    .card-date  { font-size: 0.88rem; font-weight: 300; opacity: 0.38; }

    /* ─── HERO PARALLAX ─────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
      background: #2b80ec;
    }

    .hero-layer {
      position: absolute;
      left: 0; right: 0;
      will-change: transform;
    }

    .hero-layer-sky {
      top: -12%; bottom: -12%;
    }
    .hero-sky-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .hero-layer-artefact {
      top: 16%;
      display: flex; justify-content: center;
    }
    .hero-layer-muzey {
      top: 26%;
      display: flex; justify-content: center;
    }
    .hero-layer-subtitle {
      top: calc(56% + 80px);
      display: flex; justify-content: center;
      z-index: 2;
    }

    .hero-artefact-svg { width: min(26vw, 360px); height: auto; }
    .hero-muzey-svg    { width: min(56vw, 700px); height: auto; }
    .hero-subtitle-svg { width: min(50vw, 640px); height: auto; }

    .hero-layer-city {
      bottom: -8%;
    }
    .hero-city-img {
      width: 100%; min-width: 1000px;
      height: auto; display: block;
    }

    .hero-hint {
      position: absolute;
      bottom: 26px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem; font-weight: 300;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.18em; text-transform: uppercase;
      pointer-events: none; z-index: 10; white-space: nowrap;
    }

    @media (max-width: 768px) {
      .hero { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-layer { will-change: auto; }
    }

    /* ─── ABOUT PAGE ─────────────────────────────────────────────────────────── */
    #view-about { padding-top: var(--nav-h); }

    .museum-block {
      position: relative;
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .museum-bg { position: absolute; inset: 0; }
    .museum-bg-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .museum-bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.22) 0%, rgba(0,0,0,0.62) 50%, rgba(0,0,0,0.82) 100%);
    }

    .museum-content {
      position: relative;
      z-index: 1;
      padding: 0 var(--edge) 56px;
      color: #fff;
    }

    .museum-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 64px; }

    .stat-item {
      padding: 13px 0;
      border-top: 1px solid rgba(255,255,255,0.14);
      font-weight: 300;
      font-size: 1rem;
      line-height: 1.4;
    }

    /* ─── ARTIFACT PAGE ──────────────────────────────────────────────────────── */
    #view-artifact { padding-top: var(--nav-h); }

    .artifact-body {
      display: grid;
      grid-template-columns: 55fr 45fr;
      align-items: start;
      padding-left: var(--edge);
      margin-bottom: 100px;
    }

    .artifact-photo-col {
      position: sticky;
      top: calc(var(--nav-h) + 16px);
      height: calc(100vh - var(--nav-h) - 32px);
      background: #ebebeb;
      overflow: hidden;
      align-self: start;
      border-radius: 16px;
    }

    .photo-slider {
      width: 100%;
      height: 100%;
      position: relative;
      cursor: zoom-in;
    }
    .slider-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.22s ease;
    }
    .slider-img.fading { opacity: 0; }

    .slide-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.88);
      border: none;
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
      z-index: 10;
    }
    .slide-btn:hover { background: var(--white); }
    .slide-btn.is-prev { left: 20px; }
    .slide-btn.is-next { right: 20px; }

    .slide-counter {
      position: absolute;
      bottom: 16px; right: 18px;
      font-size: 0.8rem; font-weight: 400; letter-spacing: 0.07em;
      color: #fff; background: rgba(0,0,0,0.35); padding: 4px 10px;
    }

    .artifact-content-col {
      padding: 52px 52px 100px;
      min-height: calc(100vh - var(--nav-h));
    }

    .back-btn {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 28px;
      background: none; border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem; font-weight: 400;
      color: var(--black); cursor: pointer;
      opacity: 0.38; transition: opacity 0.15s;
      padding: 0; letter-spacing: -0.01em; text-align: left;
    }
    .back-btn:hover { opacity: 1; }
    /* Hero scroll arrow */
    .hero-scroll-arrow {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: none; border: none; cursor: pointer; padding: 0;
      color: #fff;
      animation: scroll-bounce 2s ease-in-out infinite;
    }
    @keyframes scroll-bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    .artifact-title {
      font-weight: 900;
      font-size: clamp(1.75rem, 3vw, 2.75rem);
      letter-spacing: -0.03em; line-height: 1.02;
      margin-bottom: 24px;
    }

    .artifact-desc {
      font-weight: 300; font-size: 1.1rem; line-height: 1.82;
      color: var(--black); margin-bottom: 40px;
    }

    .meta-row { padding: 15px 0; border-bottom: 1px solid var(--border); }
    .meta-group + .meta-group { margin-top: 28px; }
    .meta-key {
      font-size: 0.75rem; font-weight: 400; letter-spacing: 0.1em;
      text-transform: uppercase; opacity: 0.32; margin-bottom: 5px;
    }
    .meta-val { font-size: 1rem; font-weight: 400; line-height: 1.5; }
    /* inline block: author + year + status in one row on gray rounded bg */
    .meta-row-inline {
      display: grid;
      grid-template-columns: 2fr 1fr 1.5fr;
      gap: 20px;
      padding: 20px;
      background: #f4f4f4;
      border-radius: 14px;
      margin-bottom: 28px;
    }
    .meta-author-link {
      background: none; border: none;
      cursor: pointer; font-family: 'Inter', sans-serif; font-size: 1rem;
      font-weight: 400; padding: 3px 7px; color: var(--black);
      border-radius: 7px; margin-left: -7px;
      transition: background 0.15s;
    }
    .meta-author-link:hover { background: #efefef; }
    .popup-link {
      font-size: 0.82rem; font-weight: 600; color: #000; text-decoration: none;
      display: inline-block; padding: 4px 8px; border-radius: 7px; margin-left: -8px;
      transition: background 0.15s;
    }
    .popup-link:hover { background: #f0f0f0; }

    .status-indicator { display: inline-flex; align-items: center; gap: 7px; }
    .status-indicator::before {
      content: ''; width: 8px; height: 8px;
      border-radius: 50%; flex-shrink: 0;
    }
    .status-live.status-indicator::before { background: #2ea62e; }
    .status-gone.status-indicator::before { background: #d63c3c; }

    .artifact-map-el { height: 260px; margin-top: 36px; background: #f0f0f0; border-radius: 16px; overflow: hidden; }

    /* ─── PHOTO LIGHTBOX ─────────────────────────────────────────────────────── */
    .photo-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.96);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .photo-lightbox.open { display: flex; }

    .lightbox-img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      display: block;
      cursor: default;
    }

    .lightbox-close {
      position: absolute;
      top: 20px; right: 24px;
      background: none; border: none;
      color: #fff; font-size: 1.4rem;
      cursor: pointer; opacity: 0.55;
      transition: opacity 0.15s;
      font-family: 'Inter', sans-serif;
      line-height: 1; padding: 8px;
    }
    .lightbox-close:hover { opacity: 1; }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      color: #fff;
      width: 52px; height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
      z-index: 10;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.25); }
    .lb-prev { left: 24px; }
    .lb-next { right: 24px; }
    .lb-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-size: 0.8rem; font-weight: 400; letter-spacing: 0.07em;
      pointer-events: none;
    }

    /* ─── INNER PAGES (Manifest, Contacts) ──────────────────────────────────── */
    .inner-page { padding-top: var(--nav-h); min-height: 100vh; }

    .inner-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 0 var(--edge);
      min-height: calc(100vh - var(--nav-h) - 60px);
      align-items: start;
    }

    .inner-left {
      padding: 64px var(--edge) 80px 0;
      /* no border-right */
      position: sticky;
      top: calc(var(--nav-h) + 32px);
      align-self: start;
    }

    .page-display-title {
      font-weight: 900;
      font-size: clamp(5.6rem, 12vw, 13rem);
      letter-spacing: -0.04em; line-height: 0.87; text-transform: lowercase;
    }

    .inner-right { padding: 64px 0 80px var(--edge); }

    .stat-row {
      padding: 15px 0;
      border-bottom: 1px solid var(--border);
      font-weight: 300;
      font-size: 1rem;
      line-height: 1.5;
    }

    .manifest-text p {
      font-weight: 300; font-size: 1.15rem; line-height: 1.82;
      margin-bottom: 28px; color: rgba(0,0,0,0.68);
    }
    .manifest-text p strong { font-weight: 700; color: var(--black); }
    .manifest-text p:last-child { margin-bottom: 0; }

    .contact-item { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .contact-key {
      font-size: 0.75rem; font-weight: 400; letter-spacing: 0.1em;
      text-transform: uppercase; opacity: 0.32; margin-bottom: 6px;
    }
    .contact-val { font-size: 1rem; font-weight: 300; line-height: 1.6; }
    .contact-val a {
      color: var(--black); text-decoration: none;
      border-bottom: 1px solid var(--border); transition: border-color 0.15s;
    }
    .contact-val a:hover { border-color: var(--black); }

    /* ─── MAP VIEW ───────────────────────────────────────────────────────────── */
    #view-map {
      padding-top: var(--nav-h);
      height: 100vh;
      flex-direction: column;
    }

    .map-topbar {
      height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--edge);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .map-topbar-label { font-size: 0.88rem; font-weight: 400; letter-spacing: -0.01em; }
    .map-topbar-city  { font-size: 0.78rem; font-weight: 300; opacity: 0.35; }

    /* Map + sidebar side by side */
    .map-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .main-map-el { flex: 1; }

    .map-sidebar {
      width: 300px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      overflow-y: auto;
    }

    .map-sidebar-item {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .map-sidebar-item:hover    { background: #f5f5f5; }
    .map-sidebar-item.is-active { background: #f0f0f0; }

    .map-sidebar-name {
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: -0.01em;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .map-sidebar-addr {
      font-size: 0.78rem;
      font-weight: 300;
      opacity: 0.42;
      margin-bottom: 8px;
    }

    /* ─── AUTHORS LIST ──────────────────────────────────────────────────────────── */
    .author-row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 24px;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      border-top: none; border-left: none; border-right: none;
      cursor: pointer;
      transition: opacity 0.15s;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'Inter', sans-serif;
      color: var(--black);
    }
    .author-row:hover { opacity: 0.45; }

    .author-row-photo {
      width: 72px; height: 72px;
      object-fit: cover;
      background: #e8e8e8;
      display: block;
      flex-shrink: 0;
      border-radius: 16px;
    }
    .author-row-name  { font-weight: 600; font-size: 1.05rem; letter-spacing: -0.02em; }
    .author-row-count { font-size: 0.88rem; font-weight: 300; opacity: 0.38; white-space: nowrap; }

    /* ─── AUTHOR PAGE ───────────────────────────────────────────────────────────── */
    #view-author { padding-top: var(--nav-h); }

    .author-body {
      display: grid;
      grid-template-columns: 55fr 45fr;
      align-items: start;
      padding-left: var(--edge);
      margin-bottom: 100px;
    }
    .author-photo-col {
      position: sticky;
      top: calc(var(--nav-h) + 16px);
      height: calc(100vh - var(--nav-h) - 32px);
      overflow: hidden;
      background: #e8e8e8;
      align-self: start;
      border-radius: 16px;
    }
    .author-photo-col img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .author-photo-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 6rem; opacity: 0.1;
    }
    .author-content-col {
      padding: 52px 52px 100px;
      min-height: calc(100vh - var(--nav-h));
    }
    .author-name {
      font-weight: 900;
      font-size: clamp(2rem, 3.5vw, 3rem);
      letter-spacing: -0.03em; line-height: 1.05;
      margin-bottom: 24px;
    }
    .author-bio {
      font-weight: 300; font-size: 1.1rem; line-height: 1.82;
      color: var(--black); margin-bottom: 52px;
    }
    .author-works-label {
      font-size: 0.75rem; font-weight: 400; letter-spacing: 0.1em;
      text-transform: uppercase; opacity: 0.32; margin-bottom: 20px;
    }
    .author-works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      column-gap: 14px;
      row-gap: 28px;
    }

    /* MapLibre controls z-index */
    .maplibregl-ctrl-group { z-index: 500 !important; }
    /* MapLibre popup style */
    .maplibregl-popup-content {
      border-radius: 16px !important;
      padding: 20px 24px !important;
      min-width: 260px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12) !important;
    }
    .maplibregl-popup-tip { display: none !important; }

    /* ─── FOOTER ─────────────────────────────────────────────────────────────── */
    .site-footer {
      padding: 24px var(--edge);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
      font-size: 0.82rem; font-weight: 300; opacity: 0.32;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────────────────────── */
    @media (max-width: 960px) {
      :root { --edge: 24px; }

      .museum-stats-grid { grid-template-columns: 1fr; gap: 0; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); column-gap: 10px; row-gap: 36px; }

      .artifact-body { grid-template-columns: 1fr; padding-left: 0; }
      .artifact-photo-col { position: relative; top: auto; height: auto; aspect-ratio: 3 / 2; border-radius: 0; }
      .artifact-content-col {
        border-left: none; border-top: 1px solid var(--border);
        padding: 40px 24px 100px; min-height: auto;
      }

      .author-body { grid-template-columns: 1fr; padding-left: 0; }
      .author-photo-col { position: relative; top: auto; height: auto; aspect-ratio: 3 / 2; border-radius: 0; }
      .author-content-col {
        border-left: none; border-top: 1px solid var(--border);
        padding: 40px 24px 100px; min-height: auto;
      }
      .author-works-grid { grid-template-columns: repeat(2, 1fr); }

      .inner-layout { grid-template-columns: 1fr; }
      .inner-left { position: relative; top: auto; padding: 48px 0 32px; border-bottom: 1px solid var(--border); }
      .inner-right { padding: 40px 0 60px; }

      /* Map: hide sidebar on small screens */
      .map-sidebar { display: none; }
    }

    @media (max-width: 540px) {
      :root { --edge: 16px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .nav-btn { font-size: 0.88rem; }
      .museum-content { padding-bottom: 40px; }
    }

    /* ─── HERO INTRO ANIMATION ────────────────────────────────────────────────── */
    @keyframes hero-overlay-out {
      0%   { opacity: 1; }
      100% { opacity: 0; visibility: hidden; pointer-events: none; }
    }
    @keyframes hero-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes hero-slide-up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes hero-slide-down {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* White flash overlay — fades out fast, starts below nav */
    .hero::before {
      content: '';
      position: absolute; top: var(--nav-h); bottom: 0; left: 0; right: 0; z-index: 98;
      background: #fff;
      animation: hero-overlay-out 0.4s ease forwards;
      pointer-events: none;
    }

    /* Sky slides down, city slides up */
    .hero-layer-sky  { animation: hero-slide-down 0.7s cubic-bezier(0.2,0,0,1) 0.05s both; }
    .hero-layer-city { animation: hero-slide-up   0.7s cubic-bezier(0.2,0,0,1) 0.1s  both; }

    /* Text SVGs — JS parallax owns the outer .hero-layer transform, so we animate the inner SVG */
    .hero-artefact-svg { animation: hero-slide-up 0.65s cubic-bezier(0.2,0,0,1) 0.28s both; }
    .hero-muzey-svg    { animation: hero-slide-up 0.65s cubic-bezier(0.2,0,0,1) 0.42s both; }
    .hero-subtitle-svg { animation: hero-fade-in  0.55s ease                    0.58s both; }

    /* Scroll arrow: fade in, then bounce starts */
    .hero-scroll-arrow {
      animation: hero-fade-in 0.45s ease 0.72s both,
                 scroll-bounce 2s ease-in-out 1.17s infinite;
    }

    @media (max-width: 768px) {
      .hero::before { display: none; }
      .hero-layer-sky, .hero-layer-city,
      .hero-artefact-svg, .hero-muzey-svg, .hero-subtitle-svg { animation: none; }
    }
  </style>
</head>

const artifacts = SITE_DATA.artifacts;

/* ── State ──────────────────────────────────────────────────────────────────── */
let currentView     = 'main';
let currentArtifact = null;
let currentPhotoIdx = 0;
let fadeTimer       = null;
let mainMap         = null;
let artMap          = null;
let artMarker       = null;
const markerMap     = {};

/* ── MapLibre marker element ────────────────────────────────────────────────── */
const MAP_STYLE = 'https://tiles.openfreemap.org/styles/positron';
function makeDotEl() {
  const el = document.createElement('div');
  el.style.cssText = 'width:12px;height:12px;background:#000;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,0.4);cursor:pointer';
  return el;
}

/* ── Utils ──────────────────────────────────────────────────────────────────── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Navigation ─────────────────────────────────────────────────────────────── */
function updateNavTheme() {
  const nav = document.querySelector('.site-nav');
  const onMain = currentView === 'main';
  const scrolled = window.scrollY > 400;
  const isMobile = window.innerWidth <= 768;
  if (onMain && !scrolled && !isMobile) {
    nav.classList.add('nav--transparent');
  } else {
    nav.classList.remove('nav--transparent');
  }
}

let _lastScrollY = 0;
window.addEventListener('scroll', () => {
  updateNavTheme();
  if (window.innerWidth <= 768) {
    const nav = document.querySelector('.site-nav');
    const curr = window.scrollY;
    if (curr > _lastScrollY && curr > 60) nav.classList.add('nav--hidden');
    else if (curr < _lastScrollY) nav.classList.remove('nav--hidden');
    _lastScrollY = curr;
  }
}, { passive: true });
window.addEventListener('resize', updateNavTheme, { passive: true });

function navigate(view, artifactId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.nav === view)
  );

  currentView = view;

  if (view === 'artifact' && artifactId !== undefined) {
    currentArtifact = artifacts.find(a => a.id === artifactId);
    currentPhotoIdx = 0;
    renderArtifact(currentArtifact);
    document.getElementById('view-artifact').classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  } else if (view === 'author' && artifactId !== undefined) {
    renderAuthorPage(artifactId);
    document.getElementById('view-author').classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  } else {
    document.getElementById('view-' + view).classList.add('active');
    if (view === 'map') {
      renderMapSidebar();
      setTimeout(initMainMap, 60);
    }
  }

  window.scrollTo(0, 0);
  updateNavTheme();
  if (view === 'main' && window._heroParallaxReset) window._heroParallaxReset();
}

/* ── Gallery ────────────────────────────────────────────────────────────────── */
function renderGallery() {
  document.getElementById('gallery-grid').innerHTML = artifacts.map(a => {
    const cls = a.status === 'в городе' ? 'status-live' : 'status-gone';
    return `
      <div class="card" onclick="navigate('artifact', ${a.id})">
        <div class="card-photo">
          <img src="${a.photos[0]}" alt="${escHtml(a.title)}" loading="lazy" decoding="async">
          <div class="card-hover">
            <div class="card-hover-bottom">
              <div class="card-hover-left">
                <div class="card-hover-author">${escHtml(a.artist)}</div>
                <div class="card-hover-meta">
                  <span class="card-status ${cls}">${escHtml(a.status)}</span>
                  <span class="card-hover-count">${a.photos.length} фото</span>
                </div>
              </div>
              <div class="card-hover-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 3L11 8L5 13" stroke="white" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter"/></svg></div>
            </div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">${escHtml(a.title)}</div>

  }).join('');
}

/* ── Artifact page ──────────────────────────────────────────────────────────── */
function metaRow(key, val, isHtml) {
  return `<div class="meta-row"><div class="meta-key">${key}</div><div class="meta-val">${isHtml ? val : escHtml(val)}</div></div>`;
}

function renderArtifact(a) {
  document.getElementById('art-title').textContent = a.title;
  document.getElementById('art-desc').textContent  = a.desc;

  const statusCls = a.status === 'в городе' ? 'status-live' : 'status-gone';
  const authorObj = (SITE_DATA.authors || []).find(au => au.name === a.artist);
  const artistHtml = authorObj
    ? `<button class="meta-author-link" onclick="navigate('author',${authorObj.id})">${escHtml(a.artist)}</button>`
    : escHtml(a.artist);

  document.getElementById('art-meta').innerHTML =
    `<div class="meta-row-inline">
      <div class="meta-inline-item">
        <div class="meta-key">Автор</div>
        <div class="meta-val">${artistHtml}</div>
      </div>
      <div class="meta-inline-item">
        <div class="meta-key">Год</div>
        <div class="meta-val">${escHtml(a.date)}</div>
      </div>
      <div class="meta-inline-item">
        <div class="meta-key">Статус</div>
        <div class="meta-val"><span class="status-indicator ${statusCls}">${escHtml(a.status)}</span></div>
      </div>
    </div>
    <div class="meta-group">
      ${metaRow('Материалы', a.materials, false)}
      ${metaRow('Местоположение', a.address, false)}
    </div>`;

  setSlide(a, 0);
  setTimeout(() => initArtifactMap(a), 60);
}

/* ── Navigate to gallery (scroll past hero) ─────────────────────────────────── */
function navigateToGallery() {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.nav === 'main'));
  currentView = 'main';
  document.getElementById('view-main').classList.add('active');
  updateNavTheme();
  setTimeout(() => {
    const sec = document.getElementById('gallery-section');
    if (sec) sec.scrollIntoView({ behavior: 'smooth' });
  }, 50);
}

/* ── Slider ─────────────────────────────────────────────────────────────────── */
function setSlide(a, idx) {
  const img  = document.getElementById('slider-img');
  const solo = a.photos.length <= 1;

  if (fadeTimer) clearTimeout(fadeTimer);
  img.classList.add('fading');
  fadeTimer = setTimeout(() => {
    img.src = a.photos[idx];
    img.alt = a.title;
    img.classList.remove('fading');
    fadeTimer = null;
  }, 220);

  currentPhotoIdx = idx;
  document.getElementById('slide-counter').textContent =
    solo ? '' : `${idx + 1} / ${a.photos.length}`;
  document.getElementById('btn-prev').style.display = solo ? 'none' : 'flex';
  document.getElementById('btn-next').style.display = solo ? 'none' : 'flex';
}

function slidePhoto(dir) {
  if (!currentArtifact) return;
  const total = currentArtifact.photos.length;
  setSlide(currentArtifact, (currentPhotoIdx + dir + total) % total);
}

/* ── Photo lightbox ─────────────────────────────────────────────────────────── */
function openLightbox() {
  if (!currentArtifact) return;
  const lb = document.getElementById('photo-lightbox');
  const total = currentArtifact.photos.length;
  const solo = total <= 1;
  document.getElementById('lightbox-img').src = currentArtifact.photos[currentPhotoIdx];
  document.getElementById('lb-counter').textContent = solo ? '' : `${currentPhotoIdx + 1} / ${total}`;
  lb.querySelector('.lb-prev').style.display = solo ? 'none' : 'flex';
  lb.querySelector('.lb-next').style.display = solo ? 'none' : 'flex';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('photo-lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lightboxStep(dir) {
  if (!currentArtifact) return;
  const total = currentArtifact.photos.length;
  const newIdx = (currentPhotoIdx + dir + total) % total;
  setSlide(currentArtifact, newIdx);
  document.getElementById('lightbox-img').src = currentArtifact.photos[newIdx];
  document.getElementById('lb-counter').textContent = `${newIdx + 1} / ${total}`;
}

/* Click on slider opens lightbox (ignore clicks on slide buttons) */
document.getElementById('photo-slider').addEventListener('click', e => {
  if (e.target.closest('.slide-btn')) return;
  if (currentView === 'artifact') openLightbox();
});

/* ── Artifact mini-map ──────────────────────────────────────────────────────── */
function initArtifactMap(a) {
  const el = document.getElementById('artifact-map');
  if (!artMap) {
    artMap = new maplibregl.Map({
      container: el,
      style: MAP_STYLE,
      center: [a.lng, a.lat],
      zoom: 16,
      scrollZoom: false
    });
    artMap.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');
    artMarker = new maplibregl.Marker({ element: makeDotEl() })
      .setLngLat([a.lng, a.lat])
      .addTo(artMap);
  } else {
    artMap.setCenter([a.lng, a.lat]);
    artMap.setZoom(16);
    artMarker.setLngLat([a.lng, a.lat]);
    artMap.resize();
  }
}

/* ── Main map ───────────────────────────────────────────────────────────────── */
function initMainMap() {
  const el = document.getElementById('main-map');
  if (mainMap) { mainMap.resize(); return; }

  mainMap = new maplibregl.Map({
    container: el,
    style: MAP_STYLE,
    center: [84.9744, 56.4977],
    zoom: 13
  });

  mainMap.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

  artifacts.forEach(a => {
    const dot = a.status === 'в городе' ? '#2ea62e' : '#d63c3c';
    const popup = new maplibregl.Popup({ offset: 14, closeButton: false }).setHTML(`
      <div style="font-family:'Inter',sans-serif;min-width:190px;padding:2px 0">
        <div style="font-weight:700;font-size:0.9rem;margin-bottom:4px;line-height:1.3">${escHtml(a.title)}</div>
        <div style="font-size:0.78rem;opacity:0.5;margin-bottom:8px">${escHtml(a.address)}</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;margin-bottom:12px">
          <span style="width:7px;height:7px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
          ${escHtml(a.status)}
        </div>
        <a href="#" class="popup-link" onclick="navigate('artifact',${a.id});return false;">
          Открыть <svg style="display:inline;vertical-align:middle" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7H11M11 7L7 3M11 7L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter"/></svg>
        </a>
      </div>
    `);
    const marker = new maplibregl.Marker({ element: makeDotEl() })
      .setLngLat([a.lng, a.lat])
      .setPopup(popup)
      .addTo(mainMap);
    markerMap[a.id] = marker;
  });
}

/* ── Map sidebar ────────────────────────────────────────────────────────────── */
function renderMapSidebar() {
  const sidebar = document.getElementById('map-sidebar');
  if (sidebar.childElementCount > 0) return;
  sidebar.innerHTML = artifacts.map(a => {
    const cls = a.status === 'в городе' ? 'status-live' : 'status-gone';
    return `
      <div class="map-sidebar-item" data-id="${a.id}" onclick="zoomTo(${a.id})">
        <div class="map-sidebar-name">${escHtml(a.title)}</div>
        <div class="map-sidebar-addr">${escHtml(a.address)}</div>
        <span class="card-status ${cls}" style="font-size:0.73rem">${escHtml(a.status)}</span>
      </div>`;
  }).join('');
}

function zoomTo(id) {
  Object.values(markerMap).forEach(m => {
    const p = m.getPopup();
    if (p && p.isOpen()) m.togglePopup();
  });

  document.querySelectorAll('.map-sidebar-item').forEach(el => el.classList.remove('is-active'));
  const sideEl = document.querySelector(`.map-sidebar-item[data-id="${id}"]`);
  if (sideEl) sideEl.classList.add('is-active');

  if (!mainMap) return;
  const a = artifacts.find(x => x.id === id);
  mainMap.flyTo({ center: [a.lng, a.lat], zoom: 17 });
  setTimeout(() => { if (markerMap[id]) markerMap[id].togglePopup(); }, 500);
}

/* ── Keyboard ───────────────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  const lbOpen = document.getElementById('photo-lightbox').classList.contains('open');
  if (e.key === 'Escape') {
    if (lbOpen) { closeLightbox(); return; }
    if (currentView === 'artifact') navigate('main');
    return;
  }
  if (lbOpen) {
    if (e.key === 'ArrowLeft')  lightboxStep(-1);
    if (e.key === 'ArrowRight') lightboxStep(1);
    return;
  }
  if (currentView !== 'artifact') return;
  if (e.key === 'ArrowLeft')  slidePhoto(-1);
  if (e.key === 'ArrowRight') slidePhoto(1);
});

/* ── Touch swipe ────────────────────────────────────────────────────────────── */
let touchX = 0;
const sliderEl = document.getElementById('photo-slider');
sliderEl.addEventListener('touchstart', e => { touchX = e.changedTouches[0].clientX; }, { passive: true });
sliderEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 48) slidePhoto(dx < 0 ? 1 : -1);
}, { passive: true });

/* ── Static page renderers ───────────────────────────────────────────────────── */
function renderAbout() {
  const stats = document.getElementById('about-stats');
  if (stats) stats.innerHTML = SITE_DATA.about.stats.map(s => '<div class="stat-row">' + escHtml(s) + '</div>').join('');
  const mf = document.getElementById('about-manifest');
  if (mf) mf.innerHTML = (SITE_DATA.manifest.paragraphs || []).map(p => '<p>' + p + '</p>').join('');
  const fc = document.getElementById('footer-copy-about');
  const fs = document.getElementById('footer-sub-about');
  if (fc) fc.textContent = SITE_DATA.settings.footer || '';
  if (fs) fs.textContent = SITE_DATA.settings.footerSub || '';
}
function renderContacts() {
  const el = document.getElementById('contacts-list');
  if (!el) return;
  el.innerHTML = SITE_DATA.contacts.map(c =>
    '<div class="contact-item"><div class="contact-key">' + escHtml(c.key) + '</div>' +
    '<div class="contact-val">' + escHtml(c.val) + '</div></div>'
  ).join('');
}

function pluralWorks(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 19) return n + ' работ';
  if (mod10 === 1) return n + ' работа';
  if (mod10 >= 2 && mod10 <= 4) return n + ' работы';
  return n + ' работ';
}

function renderAuthorsList() {
  const el = document.getElementById('authors-list');
  if (!el) return;
  const authors = SITE_DATA.authors || [];
  el.innerHTML = authors.map(a => {
    const count = artifacts.filter(art => art.artist === a.name).length;
    const photoHtml = a.photo
      ? '<img class="author-row-photo" src="' + escHtml(a.photo) + '" alt="">'
      : '<div class="author-row-photo"></div>';
    return '<button class="author-row" onclick="navigate(\'author\',' + a.id + ')">' +
      photoHtml +
      '<span class="author-row-name">' + escHtml(a.name) + '</span>' +
      '<span class="author-row-count">' + pluralWorks(count) + '</span>' +
      '</button>';
  }).join('');

  const copy = SITE_DATA.settings.footer || '';
  const sub  = SITE_DATA.settings.footerSub || '';
  const fc = document.getElementById('footer-copy-authors');
  const fs = document.getElementById('footer-sub-authors');
  if (fc) fc.textContent = copy;
  if (fs) fs.textContent = sub;
}

function renderAuthorPage(authorId) {
  const a = (SITE_DATA.authors || []).find(x => x.id === authorId);
  if (!a) return;

  const photoCol = document.getElementById('author-photo-col');
  photoCol.innerHTML = a.photo
    ? '<img src="' + escHtml(a.photo) + '" alt="' + escHtml(a.name) + '">'
    : '<div class="author-photo-placeholder">◯</div>';

  document.getElementById('author-name').textContent = a.name;
  document.getElementById('author-bio').textContent = a.bio;

  const works = artifacts.filter(art => art.artist === a.name);
  document.getElementById('author-works-grid').innerHTML = works.map(art => {
    const cls = art.status === 'в городе' ? 'status-live' : 'status-gone';
    return '<div class="card" onclick="navigate(\'artifact\',' + art.id + ')">' +
      '<div class="card-photo">' +
      '<img src="' + escHtml(art.photos[0] || '') + '" alt="" loading="lazy">' +
      '<div class="card-hover"><div class="card-hover-bottom">' +
      '<div class="card-hover-left"><div class="card-hover-meta"><span class="card-status ' + cls + '">' + escHtml(art.status) + '</span></div></div>' +
      '<div class="card-hover-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 3L11 8L5 13" stroke="white" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter"/></svg></div>' +
      '</div></div></div>' +
      '<div class="card-info"><div class="card-title">' + escHtml(art.title) + '</div>' +
      '<div class="card-date">' + escHtml(art.date) + '</div></div>' +
      '</div>';
  }).join('');
}

/* ── Init ───────────────────────────────────────────────────────────────────── */
(function applySettings() {
  const s = SITE_DATA.settings || {};
  const lm = document.querySelector('.nav-logo-main');
  const ls = document.querySelector('.nav-logo-sub');

  if (s.logoImage) {
    lm.innerHTML = `<img src="${s.logoImage}" style="height:30px;max-width:120px;object-fit:contain;display:block">`;
    if (ls) ls.style.display = 'none';
  } else if (s.logoSub !== undefined && ls) {
    ls.textContent = s.logoSub;
  }

  if (s.siteTitle) document.title = s.siteTitle;

  if (s.faviconImage) {
    let link = document.querySelector("link[rel*='icon']");
    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.href = s.faviconImage;
  }

  if (s.nav && s.nav.length) {
    const navLinks   = document.querySelector('.nav-links');
    const mobileMenu = document.querySelector('.nav-mobile-menu ul');
    const buildItem  = (n, mobile) => {
      const extra = mobile ? ';closeMobileMenu()' : '';
      const click = n.id === 'main' ? `navigateToGallery()${extra}` : `navigate('${n.id}')${extra}`;
      return `<li><button class="nav-btn" data-nav="${n.id}" onclick="${click}">${escHtml(n.label)}</button></li>`;
    };
    if (navLinks)   navLinks.innerHTML   = s.nav.map(n => buildItem(n, false)).join('');
    if (mobileMenu) mobileMenu.innerHTML = s.nav.map(n => buildItem(n, true)).join('');
    updateNavTheme();
  }

  if (s.mapLabel) { const el = document.getElementById('map-topbar-label'); if (el) el.textContent = s.mapLabel; }
  if (s.mapCity)  { const el = document.getElementById('map-topbar-city');  if (el) el.textContent = s.mapCity;  }

  document.querySelectorAll('.site-footer').forEach(f => {
    const spans = f.querySelectorAll('span');
    if (spans[0] && s.footer)    spans[0].textContent = s.footer;
    if (spans[1] && s.footerSub) spans[1].textContent = s.footerSub;
  });
})();

renderGallery();
renderAbout();
renderContacts();
renderAuthorsList();
updateNavTheme();

/* ── Mobile menu ────────────────────────────────────────────────────────────── */
function toggleMobileMenu() {
  var btn  = document.getElementById('nav-hamburger');
  var menu = document.getElementById('nav-mobile-menu');
  var open = menu.classList.toggle('open');
  btn.classList.toggle('open', open);
}
function closeMobileMenu() {
  document.getElementById('nav-hamburger').classList.remove('open');
  document.getElementById('nav-mobile-menu').classList.remove('open');
}

/* ── Hero parallax ──────────────────────────────────────────────────────────── */
(function() {
  const layers = document.querySelectorAll('#hero [data-speed]');
  const subtitle = document.querySelector('.hero-layer-subtitle');
  if (!layers.length) return;
  let ticking = false;
  function update() {
    if (!document.getElementById('view-main').classList.contains('active')) { ticking = false; return; }
    const sy = window.scrollY;
    layers.forEach(function(el) {
      el.style.transform = 'translateY(' + (sy * parseFloat(el.dataset.speed)) + 'px)';
    });
    if (subtitle) {
      subtitle.style.opacity = Math.max(0, 1 - sy / 200);
    }
    ticking = false;
  }
  window.addEventListener('scroll', function() {
    if (!ticking) { window.requestAnimationFrame(update); ticking = true; }
  }, { passive: true });
  update();
  window._heroParallaxReset = update;
})();
</script>
